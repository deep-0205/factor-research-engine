project:
  name: Factor Research Engine
  version: 1.0.0

universe:
  index: Nifty500
  min_avg_volume: 500000        # Liquidity filter
  lookback_days: 365

data:
  raw_path: data/raw
  processed_path: data/processed
  start_date: "2018-01-01"
  end_date: "2024-12-31"
  interval: "1d"

factors:
  momentum_window: 252
  momentum_skip: 21             # Skip last 21 days (avoid short-term reversal)
  reversal_window: 5
  volatility_window: 20

portfolio:
  rebalance_freq: monthly
  top_decile: 0.1
  bottom_decile: 0.1
  max_gross_exposure: 1.0
  max_net_exposure: 0.2

risk:
  var_confidence: 0.95
  cvar_confidence: 0.95

backtest:
  train_months: 12
  test_months: 1
  transaction_cost_bps: 10      # 10 basis points
  slippage_bps: 5

alerts:
  drawdown_threshold: -0.10     # Alert if drawdown > 10%
  var_breach_multiplier: 1.5    # Alert if VaR breached by 1.5x

